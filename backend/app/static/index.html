<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrimDM — Voice AI Dungeon Master</title>
    <link rel="stylesheet" href="/static/css/game.css?v=26">
    <script src="/static/js/app.js?v=26" type="module"></script>
  </head>

  <body>
    <!-- Scene art background / main display -->
    <div id="sceneContainer" class="scene-container">
      <div class="scene-overlay"></div>
      <img id="sceneImage" class="scene-image visible" src="/static/images/splash-crossroads.jpg" alt="Scene illustration">
      <div id="sceneCaption" class="scene-caption"></div>
    </div>

    <!-- Main game layout -->
    <div class="game-layout">
      <!-- Left: Transcript / chat -->
      <div class="transcript-panel">
        <div class="panel-header">
          <h2>Tale</h2>
          <div class="connection-status">
            <div id="dmIndicator" class="dm-indicator" aria-hidden="true">
              <canvas id="dmHeartbeat" class="dm-heartbeat-canvas" width="120" height="36" aria-hidden="true"></canvas>
              <span id="dmIndicatorText" class="dm-indicator-text"></span>
            </div>
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
          </div>
        </div>
        <div id="transcript" class="transcript-content"></div>

        <div class="input-area">
          <form id="messageForm">
            <input
              type="text"
              id="textInput"
              placeholder="Type or speak..."
              autocomplete="off"
              aria-label="Message input"
            />
            <button type="submit" id="sendBtn" disabled aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </form>
          <div class="audio-controls">
            <button type="button" id="micBtn" aria-label="Start voice input">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
              <span>Speak</span>
            </button>
            <button type="button" id="cameraBtn" class="camera-btn" aria-label="Open camera">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span>Camera</span>
            </button>
            <label class="music-slider-control" aria-label="Music volume">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
              <input type="range" id="musicVolume" min="0" max="100" value="0" aria-label="Music volume">
            </label>
          </div>
        </div>
      </div>

      <!-- Right: Character sheet -->
      <div class="character-panel">
        <div class="panel-header">
          <h2>Character</h2>
        </div>
        <div class="character-content">
          <div class="stat-group">
            <div class="char-name" id="charName">Wanderer</div>
            <div class="char-level">Level <span id="charLevel">1</span></div>
          </div>

          <div class="stat-group vitals-group">
            <div class="vital-bar-row">
              <span class="vital-bar-label">HP</span>
              <canvas id="hpStrip" class="vital-strip-canvas" width="200" height="20" role="img" aria-label="HP bar"></canvas>
              <span class="vital-bar-value" id="hpValue">20/20</span>
            </div>
            <div class="vital-bar-row">
              <span class="vital-bar-label xp">XP</span>
              <canvas id="xpStrip" class="vital-strip-canvas" width="200" height="20" role="img" aria-label="XP bar"></canvas>
              <span class="vital-bar-value" id="xpValue">0</span>
            </div>
            <div class="vital-bar-row">
              <span class="vital-bar-label mp">MP</span>
              <canvas id="manaStrip" class="vital-strip-canvas" width="200" height="20" role="img" aria-label="Mana bar"></canvas>
              <span class="vital-bar-value" id="manaValue">20/20</span>
            </div>
          </div>

          <div class="stat-group">
            <div class="stats-grid" id="statsGrid"></div>
          </div>

          <!-- Hidden stat values for accessibility / JS state -->
          <div class="sr-only" aria-hidden="true">
            <span id="hpBar" data-hp="20" data-maxhp="20"></span>
            <span id="hpText"></span>
            <span id="xpBar"></span>
            <span id="xpText"></span>
            <span id="charStr">10</span>
            <span id="charDex">10</span>
            <span id="charCon">10</span>
            <span id="charWis">10</span>
            <span id="charCha">10</span>
          </div>

          <div class="derived-row">
            <div class="derived-stat"><span class="derived-label">ATK</span><span class="derived-value" id="charAtk">5</span></div>
            <div class="derived-stat"><span class="derived-label">DEF</span><span class="derived-value" id="charDef">3</span></div>
            <div class="derived-stat"><span class="derived-label">Gold</span><span class="derived-value derived-gold" id="charGold">10</span></div>
          </div>

          <div class="stat-group compass-group">
            <div class="compass-row">
              <canvas id="compassCanvas" class="compass-canvas" width="100" height="100" role="img" aria-label="Navigation compass"></canvas>
              <div class="exit-list" id="charExits"></div>
            </div>
            <div class="location-name" id="charLocation">The Crossroads</div>
          </div>

          <div class="stat-group combat-group" style="display:none" id="combatGroup">
            <label>Combat</label>
            <div class="enemy-row" id="enemyRow"></div>
          </div>

          <div class="stat-group creature-radar-group" style="display:none" id="creatureRadarGroup">
            <label>Nearby</label>
            <canvas id="creatureRadar" class="creature-radar-canvas" role="img" aria-label="Nearby creatures radar"></canvas>
          </div>

          <div class="stat-group">
            <label>Inventory</label>
            <div id="inventoryList" class="inventory-list">
              <div class="empty-state">Empty</div>
            </div>
          </div>

          <div class="stat-group">
            <label>Quests</label>
            <div id="questList" class="quest-list">
              <div class="empty-state">No active quests</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Camera overlay -->
    <div id="cameraOverlay" class="camera-overlay" aria-hidden="true">
      <button id="cameraCloseBtn" class="camera-close-btn" aria-label="Close camera">&times;</button>
      <div class="camera-hint" id="cameraHint">Snap a photo for the DM</div>
      <video id="cameraViewfinder" class="camera-viewfinder" autoplay playsinline></video>
      <button id="cameraSnapBtn" class="camera-snap-btn" aria-label="Take photo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </button>
      <!-- Fallback file input for denied camera -->
      <input type="file" id="cameraFileInput" accept="image/*" capture="environment" style="display:none">
    </div>

    <!-- Gesture prompt -->
    <div id="gesturePrompt" class="gesture-prompt" aria-hidden="true"></div>

    <!-- Dice roll overlay -->
    <div id="diceOverlay" class="dice-overlay" aria-hidden="true">
      <div class="dice-result">
        <div class="dice-value" id="diceValue"></div>
        <div class="dice-detail" id="diceDetail"></div>
      </div>
    </div>

    <!-- NPC speech bubble -->
    <div id="npcSpeech" class="npc-speech" aria-live="polite" aria-hidden="true">
      <div class="npc-speech-name" id="npcSpeechName"></div>
      <div class="npc-speech-text" id="npcSpeechText"></div>
    </div>

    <!-- Bottom controls -->
    <div class="bottom-controls">
      <button id="pauseBtn" class="bottom-btn" title="Save & pause game">Save</button>
      <span class="bottom-sep">|</span>
      <button id="loadBtn" class="bottom-btn" title="Load saved game">Load</button>
      <span class="bottom-sep">|</span>
      <button id="newGameBtn" class="bottom-btn bottom-btn--danger" title="Start a new game">New Game</button>
      <span class="version-tag">v0.1.0</span>
    </div>
  </body>
</html>
